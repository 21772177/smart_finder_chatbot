<!doctype html><html><head><meta charset="utf-8"/><title>AutoFinder Chat Demo</title></head><body>
<h2>AutoFinder Chat Demo (Firebase)</h2>
<textarea id="q" rows="3" cols="60">Show my Goa reels</textarea><br/>
<button id="send">Send</button>
<pre id="out"></pre>
<script>
document.getElementById('send').onclick = async ()=>{
  const text = document.getElementById('q').value;
  const res = await fetch('/queryHandler', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
  const j = await res.json(); document.getElementById('out').innerText = JSON.stringify(j,null,2);
};
</script></body></html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Smart Finder AI - Chatbot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Helvetica,Arial;margin:0;background:#f7f7f9}
    #app{max-width:720px;margin:24px auto;padding:16px}
    #chat{height:60vh;overflow:auto;background:#fff;border:1px solid #e2e2e8;padding:12px;border-radius:8px}
    .msg{margin:8px 0}
    .you{color:#0b5cff}
    .bot{color:#333}
    #inputRow{display:flex;margin-top:12px}
    input{flex:1;padding:10px;border-radius:6px;border:1px solid #ddd}
    button{margin-left:8px;padding:10px 14px;border-radius:6px;border:none;background:#0b5cff;color:#fff;cursor:pointer}
    button:hover{background:#0056b3}
    button:disabled{background:#ccc;cursor:not-allowed}
    
    /* Auth Modal */
    #authModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
    #authContent{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px;border-radius:12px;max-width:400px;width:90%}
    .closeBtn{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#999}
    .authInput{margin:12px 0;width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
    .authBtn{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none;cursor:pointer;font-weight:600}
    .connectYoutube{background:#ff0000;color:#fff}
    .connectInstagram{background:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);color:#fff}
    .connectFacebook{background:#1877f2;color:#fff}
    .statusBadge{padding:4px 12px;border-radius:12px;font-size:12px;margin:4px}
    .connected{background:#28a745;color:#fff}
    .disconnected{background:#dc3545;color:#fff}
    #userInfo{margin-bottom:12px;padding:12px;background:#e7f3ff;border-radius:6px;font-size:14px}
  </style>
</head>
<body>
  <div id="app">
    <h2>Smart Finder AI - Chatbot</h2>
    <p style="font-size:12px;color:#666;margin-top:-8px;">Search your saved videos, reels, and posts from YouTube, Instagram, Facebook, and more!</p>
    
    <!-- User Info Display -->
    <div id="userInfo" style="display:none;">
      <strong>Connected Platforms:</strong>
      <button onclick="showAuthModal()" style="float:right;padding:4px 12px;font-size:12px;background:#0b5cff;color:#fff;border:none;border-radius:4px;cursor:pointer">Settings</button>
      <div id="platformStatus" style="margin-top:8px;font-size:12px;"></div>
    </div>
    
    <div id="chat"></div>
    <div id="inputRow">
      <input id="q" placeholder="Try: 'Find Goa travel reels I saved' or 'Show me cooking videos from YouTube'" onkeypress="if(event.key==='Enter') document.getElementById('send').click()" />
      <button id="send">Send</button>
    </div>
    <div style="margin-top:12px;font-size:11px;color:#999;text-align:center;">
      <small>💡 <a href="#" onclick="showAuthModal();return false;" style="color:#0b5cff;text-decoration:none;">Connect your accounts</a> to search your saved content</small>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="authModal">
    <div id="authContent">
      <button class="closeBtn" onclick="closeAuthModal()">&times;</button>
      <h3>Connect Your Accounts</h3>
      
      <!-- Platform Connections -->
      <div id="step2">
        <p>Connect your social media accounts:</p>
        
        <div id="platformButtons">
          <button class="authBtn connectYoutube" onclick="connectPlatform('youtube')">
            <span id="youtubeStatus">🔴</span> Connect YouTube
          </button>
          <button class="authBtn connectInstagram" onclick="connectPlatform('instagram')">
            <span id="instagramStatus">🔴</span> Connect Instagram
          </button>
          <button class="authBtn connectFacebook" onclick="connectPlatform('facebook')">
            <span id="facebookStatus">🔴</span> Connect Facebook
          </button>
        </div>
        
        <button class="authBtn" style="background:#28a745;color:#fff;margin-top:12px" onclick="syncAllPlatforms()">
          🔄 Sync All Content
        </button>
        <button class="authBtn" style="background:#6c757d;color:#fff;margin-top:8px" onclick="closeAuthModal()">Done</button>
      </div>
    </div>
  </div>

<script>
const chat = document.getElementById('chat');
const q = document.getElementById('q');
let deviceToken = null;

// Initialize device token
deviceToken = localStorage.getItem('sf_device_token') || generateToken();
localStorage.setItem('sf_device_token', deviceToken);

// Check platform status
checkPlatformStatus();

// Listen for OAuth tokens from direct routes (Gemini v2 approach)
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'smartfinder_tokens') {
    const provider = event.data.provider;
    const tokens = event.data.tokens;
    localStorage.setItem('sf_' + provider + '_tokens', JSON.stringify(tokens));
    checkPlatformStatus();
    closeAuthModal();
    append('Bot', `✅ ${provider} connected successfully! Your saved content is being indexed in the background.`, 'bot');
  }
});

// Sync function kept for manual sync button (optional)
async function syncPlatform(platform) {
  if (!deviceToken) return;
  
  try {
    append('Bot', `🔄 Syncing all saved content from ${platform}...`, 'bot');
    
    const response = await fetch('/api/sync', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        token: deviceToken,
        platform: platform
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      // Remove syncing message
      const messages = chat.querySelectorAll('.msg');
      if (messages.length > 0) {
        messages[messages.length - 1].remove();
      }
      append('Bot', `✅ Synced ${data.itemsIndexed} items from ${platform}! All your saved content is now searchable.`, 'bot');
    } else {
      append('Bot', `⚠️ Sync completed with some issues: ${data.message}`, 'bot');
    }
  } catch (error) {
    console.error('Sync error:', error);
    append('Bot', `⚠️ Error syncing ${platform}: ${error.message}`, 'bot');
  }
}

async function syncAllPlatforms() {
  if (!deviceToken) return;
  
  try {
    append('Bot', '🔄 Syncing all saved content from all connected platforms... This may take a few minutes.', 'bot');
    
    const response = await fetch('/api/sync-all', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        token: deviceToken
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      // Remove syncing message
      const messages = chat.querySelectorAll('.msg');
      if (messages.length > 0) {
        messages[messages.length - 1].remove();
      }
      append('Bot', `✅ Sync complete! Indexed ${data.totalIndexed} items from ${data.results.length} platform(s). All your saved content is now searchable!`, 'bot');
      
      // Update status
      checkPlatformStatus();
    } else {
      append('Bot', `⚠️ Sync completed with some issues: ${data.message}`, 'bot');
    }
  } catch (error) {
    console.error('Sync all error:', error);
    append('Bot', `⚠️ Error syncing: ${error.message}`, 'bot');
  }
}

document.getElementById('send').onclick = async () => {
  const text = q.value.trim();
  if(!text) return;
  append('You', text, 'you');
  q.value = '';
  const searchingMsg = append('Bot','Searching...', 'bot');
  try {
    const token = deviceToken || generateToken();
    localStorage.setItem('sf_device_token', token);
    const location = await getLocation();
    
    // Include connected tokens from localStorage (Gemini v2 package style)
    const ig = JSON.parse(localStorage.getItem('sf_instagram_tokens') || 'null');
    const yt = JSON.parse(localStorage.getItem('sf_youtube_tokens') || 'null');
    const google = JSON.parse(localStorage.getItem('sf_google_tokens') || 'null');
    
    const requestBody = {
      query: text,
      text: text, // Support both for compatibility
      token: token,
      location: location
    };
    
    // Add direct access tokens if available
    if (ig && ig.access_token) requestBody.ig_access = ig.access_token;
    if (yt && yt.access_token) requestBody.yt_access = yt.access_token;
    if (google && google.access_token) requestBody.google_access = google.access_token;
    
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(requestBody)
    });
    
    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }
    
    const data = await res.json();
    searchingMsg.remove();
    append('Bot', formatResult(data), 'bot');
  } catch(e){
    searchingMsg.remove();
    append('Bot','Error: '+e.message,'bot');
  }
};

function append(who, text, cls){
  const d = document.createElement('div');
  d.className='msg '+cls;
  d.innerHTML = '<b>'+who+':</b> '+text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function generateToken(){
  return 'sf-'+Math.random().toString(36).slice(2)+Date.now().toString(36);
}

function getLocation(){
  return new Promise((resolve) => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          resolve({
            lat: position.coords.latitude,
            lng: position.coords.longitude
          });
        },
        () => {
          resolve({ lat: null, lng: null });
        },
        { timeout: 5000 }
      );
    } else {
      resolve({ lat: null, lng: null });
    }
  });
}

// Auth Functions
function showAuthModal() {
  document.getElementById('authModal').style.display = 'block';
  checkPlatformStatus();
}

function closeAuthModal() {
  document.getElementById('authModal').style.display = 'none';
}


// Using simple direct OAuth routes (Gemini v2 approach) - no PKCE needed

// Simple OAuth connection using direct routes (Gemini v2 approach)
async function connectPlatform(platform) {
  try {
    // Use direct OAuth routes from Gemini v2 package
    const popup = window.open(`/auth/${platform}`, 'sf_oauth_' + platform, 'width=600,height=700');
    
    // Listen for tokens from popup
    window.addEventListener('message', function handler(e) {
      if (e.data && e.data.type === 'smartfinder_tokens' && e.origin === window.location.origin) {
        const tokens = e.data.tokens;
        const provider = e.data.provider || platform;
        localStorage.setItem('sf_' + provider + '_tokens', JSON.stringify(tokens));
        
        // Save token to backend for auto-sync (if device token available)
        if (deviceToken) {
          fetch('/api/auth/save-tokens', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              token: deviceToken,
              platform: provider,
              accessToken: tokens.access_token
            })
          })
          .then(() => {
            // Trigger auto-sync in background (SILENT - no UI messages)
            if (tokens.access_token) {
              fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                  token: deviceToken,
                  platform: provider
                })
              })
              .then(() => {
                // Silent success - sync happens in background
                console.log(`Background sync completed for ${provider}`);
              })
              .catch(err => {
                // Silent error - log only, don't show to user
                console.error('Background sync error:', err);
              });
            }
          })
          .catch(err => console.error('Error saving token:', err));
        }
        
        checkPlatformStatus();
        if (popup) popup.close();
        window.removeEventListener('message', handler);
        append('Bot', `✅ ${provider} connected successfully! Content is syncing in the background.`, 'bot');
      }
    });
  } catch (error) {
    alert('Error connecting ' + platform + ': ' + error.message);
    console.error('OAuth error:', error);
  }
}

async function checkPlatformStatus() {
  if (!deviceToken) return;
  
  try {
    const response = await fetch(`/api/auth/status?token=${encodeURIComponent(deviceToken)}`);
    const data = await response.json();
    
    // Update status indicators
    updateStatusIndicator('youtube', data.connectedPlatforms.includes('youtube'));
    updateStatusIndicator('instagram', data.connectedPlatforms.includes('instagram'));
    updateStatusIndicator('facebook', data.connectedPlatforms.includes('facebook'));
    
    // Update platform status display
    updatePlatformStatusDisplay(data);
    
    // Show user info if any platform is connected
    if (data.connectedPlatforms.length > 0) {
      document.getElementById('userInfo').style.display = 'block';
    }
  } catch (error) {
    console.error('Error checking status:', error);
  }
}

function updateStatusIndicator(platform, connected) {
  const statusEl = document.getElementById(platform + 'Status');
  if (statusEl) {
    statusEl.textContent = connected ? '✅' : '🔴';
  }
}

function updatePlatformStatusDisplay(data) {
  const statusDiv = document.getElementById('platformStatus');
  if (!statusDiv) return;
  
  const platforms = {
    youtube: 'YouTube',
    instagram: 'Instagram',
    facebook: 'Facebook'
  };
  
  let html = '';
  data.connectedPlatforms.forEach(p => {
    html += `<span class="statusBadge connected">✅ ${platforms[p]}</span>`;
  });
  data.disconnectedPlatforms.forEach(p => {
    html += `<span class="statusBadge disconnected">❌ ${platforms[p]}</span>`;
  });
  
  statusDiv.innerHTML = html || '<small>No platforms connected</small>';
}


function formatResult(data){
  if(!data) return 'No response received';
  
  let output = data.response || data.message || '';
  
  if(data.results && data.results.length > 0) {
    const rs = data.results.map(r => {
      let result = '';
      
      // YouTube videos
      if(r.platform==='YouTube' || r.platform==='youtube') {
        result = '<div style="margin:8px 0;padding:8px;background:#f5f5f5;border-radius:6px;">';
        if(r.thumbnail) {
          result += `<img src="${r.thumbnail}" style="width:120px;height:90px;object-fit:cover;border-radius:4px;margin-right:8px;float:left;" />`;
        }
        result += `<strong>${r.title || 'Video'}</strong><br>`;
        if(r.channel) result += `<small>Channel: ${r.channel}</small><br>`;
        if(r.description) result += `<small style="color:#666;">${r.description.substring(0,100)}...</small><br>`;
        if(r.publishedAt) result += `<small>Published: ${new Date(r.publishedAt).toLocaleDateString()}</small><br>`;
        if(r._note) result += `<small style="color:#856404;font-style:italic;">ℹ️ ${r._note}</small><br>`;
        if(r.url) result += `<a href="${r.url}" target="_blank" style="color:#0b5cff;text-decoration:none;">▶ Watch on YouTube →</a>`;
        result += '</div>';
        return result;
      }
      
      // Instagram reels/posts
      if(r.platform==='Instagram' || r.platform==='instagram') {
        result = '<div style="margin:8px 0;padding:8px;background:#f5f5f5;border-radius:6px;">';
        if(r.thumbnail || r.mediaUrl) {
          result += `<img src="${r.thumbnail || r.mediaUrl}" style="width:120px;height:120px;object-fit:cover;border-radius:4px;margin-right:8px;float:left;" />`;
        }
        result += `<strong>Instagram ${r.type || 'Post'}</strong><br>`;
        if(r.caption) result += `<small>${r.caption.substring(0,150)}${r.caption.length > 150 ? '...' : ''}</small><br>`;
        if(r.timestamp) result += `<small>${new Date(r.timestamp).toLocaleDateString()}</small><br>`;
        if(r.url) result += `<a href="${r.url}" target="_blank" style="color:#0b5cff;text-decoration:none;">📱 View on Instagram →</a>`;
        result += '</div>';
        return result;
      }
      
      // Facebook posts
      if(r.platform==='Facebook' || r.platform==='facebook') {
        result = '<div style="margin:8px 0;padding:8px;background:#f5f5f5;border-radius:6px;">';
        if(r.mediaUrl) {
          result += `<img src="${r.mediaUrl}" style="width:120px;height:120px;object-fit:cover;border-radius:4px;margin-right:8px;float:left;" />`;
        }
        result += `<strong>Facebook Post</strong><br>`;
        if(r.message) result += `<small>${r.message.substring(0,150)}${r.message.length > 150 ? '...' : ''}</small><br>`;
        if(r.timestamp) result += `<small>${new Date(r.timestamp).toLocaleDateString()}</small><br>`;
        if(r.url) result += `<a href="${r.url}" target="_blank" style="color:#0b5cff;text-decoration:none;">👤 View on Facebook →</a>`;
        result += '</div>';
        return result;
      }
      
      // Maps/restaurants
      if(r.platform==='maps' || r.platform==='zomato') {
        result = r.title;
        if(r.distance_m) result += ' — ' + r.distance_m + 'm away';
        if(r.rating) result += ' | ⭐ ' + r.rating;
        if(r.open_now) result += ' | Open Now';
        if(r.url) result += ' <a href="' + r.url + '" target="_blank" style="color:#0b5cff">View →</a>';
        return result;
      }
      
      // Timeline
      if(r.platform==='google_timeline') {
        result = r.place || 'Unknown place';
        if(r.date) result += ' on ' + new Date(r.date).toLocaleDateString();
        return result;
      }
      
      // Auth required messages
      if(r.requiresAuth || r.type === 'auth_required' || r.type === 'api_key_required') {
        result = '<div style="margin:8px 0;padding:12px;background:#fff3cd;border-left:4px solid #ffc107;border-radius:6px;">';
        result += `<strong>🔐 ${r.title || 'Connection Required'}</strong><br>`;
        result += `<small style="color:#856404;">${r.message || 'Please connect your ' + r.platform + ' account to search your saved content.'}</small>`;
        result += '</div>';
        return result;
      }
      
      // Generic fallback
      return `<div style="margin:4px 0;"><strong>${r.title || r.caption || r.message || 'Result'}</strong>${r.url ? ` <a href="${r.url}" target="_blank" style="color:#0b5cff">View →</a>` : ''}</div>`;
    });
    if(output) output += '<br><br>';
    output += rs.join('<br>');
  }
  
  return output || JSON.stringify(data);
}

// Close modal when clicking outside
window.onclick = function(event) {
  const modal = document.getElementById('authModal');
  if (event.target == modal) {
    closeAuthModal();
  }
}
</script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Smart Finder AI - Chatbot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;margin:0}
    .container{max-width:720px;margin:20px auto;padding:12px}
    #chat{height:56vh;overflow:auto;background:#fff;border-radius:8px;padding:12px;border:1px solid #e6e9ef}
    .msg{margin:8px 0;padding:8px;border-radius:6px}
    .you{background:#e9f0ff;color:#0b63ff;text-align:left}
    .bot{background:#f7f7f9;color:#111;text-align:left}
    #inputRow{display:flex;margin-top:12px}
    input{flex:1;padding:10px;border-radius:6px;border:1px solid #ddd}
    button{margin-left:8px;padding:10px 14px;border-radius:6px;border:none;background:#0b63ff;color:#fff}
    .card{border:1px solid #eee;padding:8px;margin:6px 0;border-radius:6px;background:#fff}
    .auth{margin-top:8px}
    .auth button{margin-right:8px;background:#2d8cff}
  </style>
</head>
<body>
  <div class="container">
    <h2>Smart Finder AI</h2>
    <div id="chat"></div>
    <div id="inputRow">
      <input id="q" placeholder="Type: Show my Goa reels" />
      <button id="send">Send</button>
    </div>
    <div class="auth">
      <button id="connectGoogle">Connect Google</button>
      <button id="connectInstagram">Connect Instagram</button>
      <button id="connectYouTube">Connect YouTube</button>
      <span id="authStatus"></span>
    </div>
  </div>
<script>
const chat = document.getElementById('chat');
const q = document.getElementById('q');
const authStatus = document.getElementById('authStatus');
document.getElementById('send').onclick = send;
q.addEventListener('keydown', (e)=>{ if(e.key==='Enter') send(); });
document.getElementById('connectGoogle').onclick = () => openPopup('/auth/google');
document.getElementById('connectInstagram').onclick = () => openPopup('/auth/instagram');
document.getElementById('connectYouTube').onclick = () => openPopup('/auth/youtube');

function append(kind, text, extraHtml='') {
  const d = document.createElement('div');
  d.className = 'msg ' + (kind==='you' ? 'you' : 'bot');
  d.innerHTML = '<div><strong>' + (kind==='you' ? 'You' : 'SmartFinder') + ':</strong></div><div>' + text + '</div>' + extraHtml;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function generateToken(){
  let t = localStorage.getItem('sf_device_token');
  if(!t){ t = 'sf-'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('sf_device_token', t); }
  return t;
}

async function send(){
  const text = q.value.trim();
  if(!text) return;
  append('you', text);
  q.value = '';
  append('bot', 'Searching...');
  const token = generateToken();
  const location = await getLocation();
  // include connected tokens if present
  const ig = JSON.parse(localStorage.getItem('sf_instagram_tokens') || 'null');
  const yt = JSON.parse(localStorage.getItem('sf_youtube_tokens') || 'null');
  const google = JSON.parse(localStorage.getItem('sf_google_tokens') || 'null');
  try {
    const res = await fetch('/api/query', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, token, location, ig_access: ig && ig.access_token, yt_access: yt && yt.access_token, google_access: google && google.access_token })
    });
    const data = await res.json();
    const msgs = chat.querySelectorAll('.msg');
    msgs[msgs.length-1].remove();
    renderResponse(data);
  } catch (e) {
    append('bot', 'Error: ' + e.message);
  }
}

function renderResponse(data){
  if(data.results){
    data.results.forEach(r => {
      const extra = '<div class="card"><b>' + (r.name||r.title||r.place) + '</b><div>' + (r.address||'') + '</div><div>Rating: ' + (r.rating||'N/A') + '</div><div><a href="' + (r.maps_url||r.url||'#') + '" target="_blank">Open</a></div></div>';
      append('bot', data.reply || 'Here are results', extra);
    });
    return;
  }
  if(data.reels){
    const html = data.reels.map(r=>'<div class="card"><b>' + (r.caption || 'Reel') + '</b><div><a href="'+r.permalink+'" target="_blank">Open Reel</a></div></div>').join('');
    append('bot', data.reply || 'Reels found', html);
    return;
  }
  if(data.videos){
    const html = data.videos.map(v=>'<div class="card"><b>' + v.title + '</b><div>Channel: '+v.channel+'</div><div><a href="'+v.url+'" target="_blank">Watch</a></div></div>').join('');
    append('bot', data.reply || 'Videos', html);
    return;
  }
  append('bot', data.reply || JSON.stringify(data));
}

function getLocation(){
  return new Promise((resolve)=> {
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos => resolve({lat: pos.coords.latitude, lng: pos.coords.longitude}), ()=> resolve({lat:null,lng:null}), {timeout:5000});
    } else resolve({lat:null,lng:null});
  });
}

// Open OAuth popup and listen for tokens
function openPopup(path){
  const popup = window.open(path, 'sf_oauth', 'width=600,height=700');
  window.addEventListener('message', (e) => {
    if(e.data && e.data.type === 'smartfinder_tokens') {
      const provider = e.data.provider;
      const tokens = e.data.tokens;
      if(provider === 'google') localStorage.setItem('sf_google_tokens', JSON.stringify(tokens));
      if(provider === 'instagram') localStorage.setItem('sf_instagram_tokens', JSON.stringify(tokens));
      if(provider === 'youtube') localStorage.setItem('sf_youtube_tokens', JSON.stringify(tokens));
      authStatus.innerText = provider + ' connected';
      popup.close();
    }
  }, { once: true });
}
</script>
</body>
</html>
